<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>国道位置情報取得システム</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Hiragino Sans', 'Meiryo', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 500px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            overflow: hidden;
        }
        
        header {
            background: #2c3e50;
            color: white;
            padding: 20px;
            text-align: center;
        }
        
        header h1 {
            font-size: 20px;
            margin-bottom: 5px;
        }
        
        header p {
            font-size: 12px;
            opacity: 0.8;
        }
        
        main {
            padding: 30px 20px;
        }
        
        .status {
            background: #ecf0f1;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            text-align: center;
            font-size: 14px;
            color: #7f8c8d;
        }
        
        .result {
            background: #27ae60;
            color: white;
            padding: 30px;
            border-radius: 10px;
            text-align: center;
            font-size: 28px;
            font-weight: bold;
            margin-bottom: 20px;
            min-height: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
            word-break: break-all;
        }
        
        .result.hidden {
            display: none;
        }
        
        .info-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 20px;
        }
        
        .info-card {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
        }
        
        .info-card .label {
            font-size: 12px;
            color: #7f8c8d;
            margin-bottom: 5px;
        }
        
        .info-card .value {
            font-size: 18px;
            font-weight: bold;
            color: #2c3e50;
        }
        
        button {
            width: 100%;
            padding: 15px;
            background: #3498db;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
        }
        
        button:hover {
            background: #2980b9;
        }
        
        button:active {
            transform: scale(0.98);
        }
        
        button:disabled {
            background: #95a5a6;
            cursor: not-allowed;
        }
        
        .coords {
            font-size: 12px;
            color: #7f8c8d;
            text-align: center;
            margin-top: 15px;
        }
        
        .error {
            background: #e74c3c;
            color: white;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            text-align: center;
        }
        
        .error.hidden {
            display: none;
        }
        
        footer {
            background: #ecf0f1;
            padding: 15px;
            text-align: center;
            font-size: 12px;
            color: #7f8c8d;
        }
        
        .data-info {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #ecf0f1;
            text-align: center;
            font-size: 12px;
            color: #7f8c8d;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🛣️ 国道位置情報取得システム</h1>
            <p>万世橋出張所管内 維持補修工事</p>
        </header>
        
        <main>
            <div class="status" id="status">
                位置情報取得ボタンを押してください
            </div>
            
            <div class="error hidden" id="error"></div>
            
            <div class="result hidden" id="result">
                現在位置は254 U 12.24kpです
            </div>
            
            <div class="info-grid">
                <div class="info-card">
                    <div class="label">国道番号</div>
                    <div class="value" id="routeNumber">---</div>
                </div>
                <div class="info-card">
                    <div class="label">上下線</div>
                    <div class="value" id="direction">---</div>
                </div>
                <div class="info-card">
                    <div class="label">キロポスト</div>
                    <div class="value" id="kilopost">---</div>
                </div>
                <div class="info-card">
                    <div class="label">最寄り距離</div>
                    <div class="value" id="distance">---</div>
                </div>
            </div>
            
            <button id="getLocationBtn" onclick="getLocation()">
                📍 現在位置を取得
            </button>
            
            <div class="coords" id="coords"></div>
            
            <div class="data-info" id="dataInfo">
                キロポストデータ: 読み込み中...
            </div>
        </main>
        
        <footer>
            &copy; 2026 万世橋出張所 | GPS精度により誤差が生じる場合があります
        </footer>
    </div>

    <script>
        // キロポストデータ（Excelから変換）
        let roadData = [
            { route: '4', direction: 'U', kp: 1.00, lat: 35.690690, lon: 139.774619 },
            { route: '4', direction: 'U', kp: 2.00, lat: 35.700183, lon: 139.775255 },
            { route: '4', direction: 'U', kp: 3.00, lat: 35.709472, lon: 139.776272 },
            { route: '4', direction: 'U', kp: 4.00, lat: 35.717957, lon: 139.781044 },
            { route: '4', direction: 'U', kp: 5.00, lat: 35.724687, lon: 139.787621 },
            { route: '4', direction: 'U', kp: 6.00, lat: 35.732621, lon: 139.792887 },
            { route: '4', direction: 'U', kp: 7.00, lat: 35.741737, lon: 139.799956 },
            { route: '4', direction: 'U', kp: 8.00, lat: 35.749352, lon: 139.799415 },
            { route: '4', direction: 'U', kp: 9.00, lat: 35.757377, lon: 139.800656 },
            { route: '4', direction: 'U', kp: 10.00, lat: 35.766744, lon: 139.800367 },
            { route: '4', direction: 'U', kp: 11.00, lat: 35.775518, lon: 139.800315 },
            { route: '4', direction: 'U', kp: 12.00, lat: 35.784669, lon: 139.800287 },
            { route: '4', direction: 'U', kp: 13.00, lat: 35.794383, lon: 139.800239 },
            { route: '4', direction: 'U', kp: 14.00, lat: 35.802597, lon: 139.801536 },
            { route: '17', direction: 'U', kp: 1.00, lat: 35.685544, lon: 139.766092 },
            { route: '17', direction: 'U', kp: 2.00, lat: 35.693581, lon: 139.767758 },
            { route: '17', direction: 'U', kp: 3.00, lat: 35.703617, lon: 139.763188 },
            { route: '17', direction: 'U', kp: 4.00, lat: 35.712483, lon: 139.759497 },
            { route: '17', direction: 'U', kp: 5.00, lat: 35.720488, lon: 139.752512 },
            { route: '17', direction: 'U', kp: 6.00, lat: 35.727968, lon: 139.744868 },
            { route: '17', direction: 'U', kp: 7.00, lat: 35.734077, lon: 139.737142 },
            { route: '17', direction: 'U', kp: 8.00, lat: 35.741605, lon: 139.728331 },
            { route: '17', direction: 'U', kp: 9.00, lat: 35.749010, lon: 139.719416 },
            { route: '17', direction: 'U', kp: 10.00, lat: 35.755370, lon: 139.709038 },
            { route: '17', direction: 'U', kp: 11.00, lat: 35.760423, lon: 139.700641 },
            { route: '17', direction: 'U', kp: 12.00, lat: 35.768843, lon: 139.700385 },
            { route: '17', direction: 'U', kp: 13.00, lat: 35.778008, lon: 139.697929 },
            { route: '17', direction: 'U', kp: 14.00, lat: 35.781356, lon: 139.690824 },
            { route: '17', direction: 'U', kp: 15.00, lat: 35.787092, lon: 139.685169 },
            { route: '17BP', direction: 'U', kp: 16.00, lat: 35.777075, lon: 139.661103 },
            { route: '17BP', direction: 'U', kp: 17.00, lat: 35.781420, lon: 139.649393 },
            { route: '17BP', direction: 'U', kp: 18.00, lat: 35.788234, lon: 139.643231 },
            { route: '254', direction: 'U', kp: 1.00, lat: 35.708475, lon: 139.750192 },
            { route: '254', direction: 'U', kp: 2.00, lat: 35.717225, lon: 139.741043 },
            { route: '254', direction: 'U', kp: 3.00, lat: 35.723181, lon: 139.733411 },
            { route: '254', direction: 'U', kp: 4.00, lat: 35.729678, lon: 139.726093 },
            { route: '254', direction: 'U', kp: 5.00, lat: 35.732236, lon: 139.720578 },
            { route: '254', direction: 'U', kp: 6.00, lat: 35.738425, lon: 139.711792 },
            { route: '254', direction: 'U', kp: 7.00, lat: 35.742535, lon: 139.703462 },
            { route: '254', direction: 'U', kp: 8.00, lat: 35.750381, lon: 139.694878 },
            { route: '254', direction: 'U', kp: 9.00, lat: 35.756139, lon: 139.685413 },
            { route: '254', direction: 'U', kp: 10.00, lat: 35.762689, lon: 139.677311 },
            { route: '254', direction: 'U', kp: 11.00, lat: 35.767225, lon: 139.666038 },
            { route: '254', direction: 'U', kp: 12.00, lat: 35.776012, lon: 139.656039 },
            { route: '254', direction: 'U', kp: 13.00, lat: 35.767957, lon: 139.646370 },
            { route: '254', direction: 'U', kp: 14.00, lat: 35.773739, lon: 139.636419 },
            { route: '254', direction: 'U', kp: 15.00, lat: 35.778944, lon: 139.626766 }
        ];
        
        let dataLoaded = true;
        
        // ページ読み込み時の初期化
        window.onload = function() {
            const dataInfo = document.getElementById('dataInfo');
            dataInfo.textContent = `キロポストデータ: ${roadData.length}件 読み込み完了`;
            console.log('国道位置情報取得システム起動');
            console.log(`登録データ数: ${roadData.length}件`);
        };

        function getLocation() {
            if (!dataLoaded) {
                showError('キロポストデータが読み込まれていません');
                return;
            }
            
            const btn = document.getElementById('getLocationBtn');
            const status = document.getElementById('status');
            const error = document.getElementById('error');
            const result = document.getElementById('result');
            
            btn.disabled = true;
            status.textContent = '位置情報を取得中...';
            error.classList.add('hidden');
            result.classList.add('hidden');
            
            if (!navigator.geolocation) {
                showError('お使いのブラウザは位置情報に対応していません');
                btn.disabled = false;
                return;
            }
            
            navigator.geolocation.getCurrentPosition(
                position => {
                    const lat = position.coords.latitude;
                    const lon = position.coords.longitude;
                    const accuracy = position.coords.accuracy;
                    
                    document.getElementById('coords').textContent = 
                        `緯度: ${lat.toFixed(6)}, 経度: ${lon.toFixed(6)} (精度: ±${accuracy.toFixed(0)}m)`;
                    
                    const nearest = findNearestRoad(lat, lon);
                    
                    if (nearest) {
                        displayResult(nearest);
                        status.textContent = '位置情報取得成功';
                    } else {
                        showError('近くに登録された国道データが見つかりません（検索範囲: 500m以内）');
                    }
                    
                    btn.disabled = false;
                },
                error => {
                    let errorMsg = '位置情報の取得に失敗しました';
                    
                    switch(error.code) {
                        case error.PERMISSION_DENIED:
                            errorMsg = '位置情報の使用が許可されていません。ブラウザの設定を確認してください。';
                            break;
                        case error.POSITION_UNAVAILABLE:
                            errorMsg = '位置情報が利用できません';
                            break;
                        case error.TIMEOUT:
                            errorMsg = '位置情報の取得がタイムアウトしました';
                            break;
                    }
                    
                    showError(errorMsg);
                    btn.disabled = false;
                },
                {
                    enableHighAccuracy: true,
                    timeout: 10000,
                    maximumAge: 0
                }
            );
        }
        
        function findNearestRoad(lat, lon) {
            let nearest = null;
            let minDistance = Infinity;
            
            roadData.forEach(road => {
                const distance = calculateDistance(lat, lon, road.lat, road.lon);
                
                if (distance < minDistance) {
                    minDistance = distance;
                    nearest = {
                        ...road,
                        distance: distance
                    };
                }
            });
            
            // 最寄りが500m以内の場合のみ有効とする
            if (nearest && nearest.distance <= 500) {
                return nearest;
            }
            
            return null;
        }
        
        function calculateDistance(lat1, lon1, lat2, lon2) {
            const R = 6371000; // 地球の半径（メートル）
            const dLat = toRad(lat2 - lat1);
            const dLon = toRad(lon2 - lon1);
            
            const a = Math.sin(dLat / 2) * Math.sin(dLat / 2) +
                      Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) *
                      Math.sin(dLon / 2) * Math.sin(dLon / 2);
            
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
            const distance = R * c;
            
            return distance;
        }
        
        function toRad(degrees) {
            return degrees * Math.PI / 180;
        }
        
        function displayResult(road) {
            const result = document.getElementById('result');
            const routeNumber = document.getElementById('routeNumber');
            const direction = document.getElementById('direction');
            const kilopost = document.getElementById('kilopost');
            const distance = document.getElementById('distance');
            
            const directionText = road.direction === 'U' ? '上り' : '下り';
            
            result.textContent = `現在位置は${road.route} ${road.direction} ${road.kp.toFixed(2)}kpです`;
            result.classList.remove('hidden');
            
            routeNumber.textContent = `国道${road.route}号`;
            direction.textContent = directionText;
            kilopost.textContent = `${road.kp.toFixed(2)}kp`;
            distance.textContent = `${road.distance.toFixed(0)}m`;
        }
        
        function showError(message) {
            const error = document.getElementById('error');
            const status = document.getElementById('status');
            
            error.textContent = message;
            error.classList.remove('hidden');
            status.textContent = 'エラーが発生しました';
        }
    </script>
</body>
</html>
