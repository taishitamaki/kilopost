<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>万世橋くん ver.0.1</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Hiragino Kaku Gothic Pro', 'ヒラギノ角ゴ Pro W3', 'メイリオ', Meiryo, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            overflow: hidden;
        }
        header {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: white;
            padding: 25px 20px;
            text-align: center;
        }
        header h1 {
            font-size: 28px;
            margin-bottom: 5px;
        }
        header .version {
            font-size: 14px;
            opacity: 0.9;
        }
        main {
            padding: 30px 20px;
        }
        .button-container {
            text-align: center;
            margin-bottom: 30px;
        }
        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 18px;
            border-radius: 50px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
        }
        button:active {
            transform: translateY(0);
        }
        button:disabled {
            background: #ccc;
            cursor: not-allowed;
            box-shadow: none;
        }
        .result {
            background: #f8f9fa;
            border-left: 4px solid #667eea;
            padding: 20px;
            border-radius: 8px;
            margin-top: 20px;
            display: none;
        }
        .result.show {
            display: block;
            animation: fadeIn 0.5s;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .result-text {
            font-size: 16px;
            line-height: 1.8;
            color: #333;
        }
        .result-text strong {
            color: #1e3c72;
            font-size: 18px;
        }
        .address-info {
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px dashed #ddd;
        }
        .error {
            background: #fff3cd;
            border-left: 4px solid #ff6b6b;
            color: #856404;
            padding: 15px;
            border-radius: 8px;
            margin-top: 20px;
            display: none;
        }
        .error.show {
            display: block;
            animation: fadeIn 0.5s;
        }
        .loading {
            text-align: center;
            color: #667eea;
            font-size: 16px;
            margin-top: 20px;
            display: none;
        }
        .loading.show {
            display: block;
        }
        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        footer {
            background: #f1f3f5;
            padding: 15px;
            text-align: center;
            font-size: 12px;
            color: #666;
        }
        .info-section {
            background: #e7f3ff;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
            color: #0066cc;
        }
        .stats {
            background: #f8f9fa;
            padding: 10px;
            border-radius: 5px;
            font-size: 12px;
            color: #666;
            margin-top: 10px;
        }
    </style>
</head>

            <div class="error" id="error">

            </div>
        </main>
        
        <footer>
            © 2026 Tamaki - 万世橋出張所管内国道維持補修支援システム
        </footer>
    </div>

        document.addEventListener('DOMContentLoaded', function() {
            document.getElementById('dataCount').textContent = kpData.length.toLocaleString();
        });

        function getLocation() {
            const loading = document.getElementById('loading');
            const result = document.getElementById('result');
            const error = document.getElementById('error');
            const btn = document.getElementById('getLocationBtn');
            
            result.classList.remove('show');
            error.classList.remove('show');
            loading.classList.add('show');
            btn.disabled = true;

            if (!navigator.geolocation) {
                showError('お使いのブラウザは位置情報をサポートしていません。');
                loading.classList.remove('show');
                btn.disabled = false;
                return;
            }

            navigator.geolocation.getCurrentPosition(
                position => {
                    const lat = position.coords.latitude;
                    const lon = position.coords.longitude;
                    processLocation(lat, lon);
                },
                err => {
                    loading.classList.remove('show');
                    btn.disabled = false;
                    let message = '位置情報の取得に失敗しました。';
                    if (err.code === 1) {
                        message = '位置情報の利用が許可されていません。ブラウザの設定を確認してください。';
                    } else if (err.code === 2) {
                        message = '位置情報を取得できませんでした。GPS信号を確認してください。';
                    } else if (err.code === 3) {
                        message = '位置情報の取得がタイムアウトしました。もう一度お試しください。';
                    }
                    showError(message);
                },
                {
                    enableHighAccuracy: true,
                    timeout: 15000,
                    maximumAge: 0
                }
            );
        }

        function processLocation(lat, lon) {
            if (kpData.length === 0) {
                showError('キロポストデータが読み込まれていません。');
                document.getElementById('loading').classList.remove('show');
                document.getElementById('getLocationBtn').disabled = false;
                return;
            }

            let minDistance = Infinity;
            let nearestPoint = null;

            kpData.forEach(point => {
                const distance = calculateDistance(lat, lon, point.lat, point.lon);
                if (distance < minDistance) {
                    minDistance = distance;
                    nearestPoint = point;
                }
            });

            if (nearestPoint && minDistance < 0.5) {
                getAddressFromCoords(lat, lon, nearestPoint, minDistance);
            } else {
                showError(`近くに該当する国道が見つかりませんでした。<br>最寄りの地点まで約${(minDistance * 1000).toFixed(0)}mです。`);
                document.getElementById('loading').classList.remove('show');
                document.getElementById('getLocationBtn').disabled = false;
            }
        }

        function calculateDistance(lat1, lon1, lat2, lon2) {
            const R = 6371;
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
                      Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
                      Math.sin(dLon/2) * Math.sin(dLon/2);
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
            return R * c;
        }

        async function getAddressFromCoords(lat, lon, kpPoint, distance) {
            try {
                await new Promise(resolve => setTimeout(resolve, 1000));
                
                const response = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}&zoom=18&addressdetails=1`, {
                    headers: {
                        'Accept-Language': 'ja',
                        'User-Agent': 'ManseBashiKun/0.1'
                    }
                });
                
                if (!response.ok) throw new Error('住所取得エラー');
                const data = await response.json();
                
                await new Promise(resolve => setTimeout(resolve, 1000));
                
                const bearing = Math.atan2(
                    Math.cos(lat * Math.PI / 180) * Math.sin(0.0005),
                    Math.cos(lat * Math.PI / 180) * Math.sin(0.0005)
                );
                const offset = 0.0002;
                const lat2 = lat + offset * Math.cos(bearing + Math.PI / 2);
                const lon2 = lon + offset * Math.sin(bearing + Math.PI / 2);
                
                const response2 = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat2}&lon=${lon2}&zoom=18&addressdetails=1`, {
                    headers: {
                        'Accept-Language': 'ja',
                        'User-Agent': 'ManseBashiKun/0.1'
                    }
                });
                
                if (!response2.ok) throw new Error('住所取得エラー');
                const data2 = await response2.json();

                displayResult(kpPoint, data, data2, distance);
            } catch (err) {
                showError('住所の取得に失敗しました。インターネット接続を確認してください。<br>キロポスト情報のみ表示します。');
                displayResultWithoutAddress(kpPoint, distance);
            }
        }

        function extractAddress(data) {
            if (!data.address) return '住所不明';
            const addr = data.address;
            let result = '';
            
            if (addr.city) result += addr.city;
            else if (addr.town) result += addr.town;
            
            if (addr.suburb) result += addr.suburb;
            if (addr.quarter) result += addr.quarter;
            if (addr.neighbourhood) result += addr.neighbourhood;
            if (addr.road) result += addr.road;
            if (addr.house_number) result += addr.house_number;
            
            return result || (data.display_name ? data.display_name.split(',')[0] : '住所不明');
        }

        function displayResult(kpPoint, addr1Data, addr2Data, distance) {
            const resultText = document.getElementById('resultText');
            const loading = document.getElementById('loading');
            const result = document.getElementById('result');
            const btn = document.getElementById('getLocationBtn');

            const addr1 = extractAddress(addr1Data);
            const addr2 = extractAddress(addr2Data);

            let html = `<p><strong>現在位置は${kpPoint.route} ${kpPoint.kp}kpです。</strong></p>`;
            html += `<div class="address-info">`;
            html += `<p>上り線の住所は${addr1}、下り線の住所は${addr2}です。</p>`;
            html += `<p style="font-size: 12px; color: #999; margin-top: 10px;">地点までの距離: 約${(distance * 1000).toFixed(0)}m</p>`;
            html += `</div>`;

            resultText.innerHTML = html;
            loading.classList.remove('show');
            result.classList.add('show');
            btn.disabled = false;
        }

        function displayResultWithoutAddress(kpPoint, distance) {
            const resultText = document.getElementById('resultText');
            const loading = document.getElementById('loading');
            const result = document.getElementById('result');
            const btn = document.getElementById('getLocationBtn');

            let html = `<p><strong>現在位置は${kpPoint.route} ${kpPoint.kp}kpです。</strong></p>`;
            html += `<p style="font-size: 12px; color: #999; margin-top: 10px;">地点までの距離: 約${(distance * 1000).toFixed(0)}m</p>`;

            resultText.innerHTML = html;
            loading.classList.remove('show');
            result.classList.add('show');
            btn.disabled = false;
        }

        function showError(message) {
            const errorText = document.getElementById('errorText');
            const error = document.getElementById('error');
            errorText.innerHTML = message;
            error.classList.add('show');
        }
    </script>
