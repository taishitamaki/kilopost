<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>万世橋くん ver.0.1 テスト版</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Hiragino Kaku Gothic Pro', 'ヒラギノ角ゴ Pro W3', 'メイリオ', Meiryo, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            overflow: hidden;
        }
        header {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: white;
            padding: 25px 20px;
            text-align: center;
        }
        header h1 {
            font-size: 28px;
            margin-bottom: 5px;
        }
        header .version {
            font-size: 14px;
            opacity: 0.9;
        }
        main {
            padding: 30px 20px;
        }
        .test-mode {
            background: #fff3cd;
            border-left: 4px solid #ffc107;
            color: #856404;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
            font-weight: bold;
        }
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            border-bottom: 2px solid #e0e0e0;
        }
        .tab {
            padding: 12px 24px;
            cursor: pointer;
            border: none;
            background: none;
            font-size: 16px;
            color: #666;
            transition: all 0.3s;
            border-bottom: 3px solid transparent;
        }
        .tab.active {
            color: #667eea;
            border-bottom-color: #667eea;
            font-weight: bold;
        }
        .tab:hover {
            color: #667eea;
        }
        .tab-content {
            display: none;
        }
        .tab-content.active {
            display: block;
        }
        .input-section {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
        }
        .input-group {
            margin-bottom: 15px;
        }
        .input-group:last-child {
            margin-bottom: 0;
        }
        .input-group label {
            display: block;
            font-size: 14px;
            color: #333;
            margin-bottom: 5px;
            font-weight: bold;
        }
        .input-group input {
            width: 100%;
            padding: 12px;
            font-size: 16px;
            border: 2px solid #ddd;
            border-radius: 8px;
            transition: border-color 0.3s;
        }
        .input-group input:focus {
            outline: none;
            border-color: #667eea;
        }
        .input-hint {
            font-size: 12px;
            color: #666;
            margin-top: 5px;
        }
        .button-container {
            text-align: center;
            margin-bottom: 30px;
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
        }
        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 18px;
            border-radius: 50px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
        }
        button:active {
            transform: translateY(0);
        }
        button:disabled {
            background: #ccc;
            cursor: not-allowed;
            box-shadow: none;
        }
        .btn-secondary {
            background: linear-gradient(135deg, #28a745 0%, #20c997 100%);
        }
        .btn-info {
            background: linear-gradient(135deg, #17a2b8 0%, #138496 100%);
        }
        .result {
            background: #f8f9fa;
            border-left: 4px solid #667eea;
            padding: 20px;
            border-radius: 8px;
            margin-top: 20px;
            display: none;
        }
        .result.show {
            display: block;
            animation: fadeIn 0.5s;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .result-text {
            font-size: 16px;
            line-height: 1.8;
            color: #333;
        }
        .result-text strong {
            color: #1e3c72;
            font-size: 18px;
        }
        .address-info {
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px dashed #ddd;
        }
        .error {
            background: #fff3cd;
            border-left: 4px solid #ff6b6b;
            color: #856404;
            padding: 15px;
            border-radius: 8px;
            margin-top: 20px;
            display: none;
        }
        .error.show {
            display: block;
            animation: fadeIn 0.5s;
        }
        .loading {
            text-align: center;
            color: #667eea;
            font-size: 16px;
            margin-top: 20px;
            display: none;
        }
        .loading.show {
            display: block;
        }
        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        footer {
            background: #f1f3f5;
            padding: 15px;
            text-align: center;
            font-size: 12px;
            color: #666;
        }
        .info-section {
            background: #e7f3ff;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
            color: #0066cc;
        }
        .stats {
            background: #f8f9fa;
            padding: 10px;
            border-radius: 5px;
            font-size: 12px;
            color: #666;
            margin-top: 10px;
        }
        .warning {
            background: #fff3cd;
            border-left: 4px solid #ffc107;
            color: #856404;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 13px;
        }
        .search-results {
            background: white;
            border: 1px solid #ddd;
            border-radius: 8px;
            margin-top: 10px;
            max-height: 300px;
            overflow-y: auto;
            display: none;
        }
        .search-results.show {
            display: block;
        }
        .search-result-item {
            padding: 12px;
            border-bottom: 1px solid #eee;
            cursor: pointer;
            transition: background 0.2s;
        }
        .search-result-item:hover {
            background: #f0f0f0;
        }
        .search-result-item:last-child {
            border-bottom: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>万世橋くん</h1>
            <div class="version">ver.0.1 テスト版</div>
        </header>
        
        <main>
            <div class="test-mode">
                🧪 テストモード: 緯度・経度または住所で動作確認できます
            </div>

            <div class="warning" id="csvWarning" style="display: none;">
                ⚠️ CSVファイルの読み込みに失敗しました。manseikplist.csvがHTMLと同じフォルダにあることを確認してください。
            </div>
            
            <div class="info-section">
                📍 位置情報または住所から国道番号、キロポスト、住所を取得します<br>
                <div class="stats">登録キロポスト数: <span id="dataCount">読込中...</span>件</div>
            </div>

            <div class="tabs">
                <button class="tab active" onclick="switchTab('coords')">座標入力</button>
                <button class="tab" onclick="switchTab('address')">住所検索</button>
            </div>

            <div id="coordsTab" class="tab-content active">
                <div class="input-section">
                    <div class="input-group">
                        <label for="latInput">緯度（度）</label>
                        <input type="number" id="latInput" step="0.000001" placeholder="例: 35.683417" value="35.683417">
                    </div>
                    <div class="input-group">
                        <label for="lonInput">経度（度）</label>
                        <input type="number" id="lonInput" step="0.000001" placeholder="例: 139.774500" value="139.774500">
                    </div>
                </div>
                
                <div class="button-container">
                    <button id="testLocationBtn" onclick="testLocation()">この位置でテスト</button>
                    <button class="btn-secondary" onclick="getLocation()">実際の位置を取得</button>
                </div>
            </div>

            <div id="addressTab" class="tab-content">
                <div class="input-section">
                    <div class="input-group">
                        <label for="addressInput">住所</label>
                        <input type="text" id="addressInput" placeholder="例: 板橋区大門14-3">
                        <div class="input-hint">※ 区市町村名から入力してください（例：板橋区赤塚8丁目19）</div>
                    </div>
                    <div id="searchResults" class="search-results"></div>
                </div>
                
                <div class="button-container">
                    <button class="btn-info" onclick="searchAddress()">住所から検索</button>
                </div>
            </div>
            
            <div class="loading" id="loading">
                <div class="spinner"></div>
                <p>位置情報を処理中...</p>
            </div>
            
            <div class="result" id="result">
                <div class="result-text" id="resultText"></div>
            </div>
            
            <div class="error" id="error">
                <p id="errorText"></p>
            </div>
        </main>
        
        <footer>
            © 2026 Tamaki
        </footer>
    </div>

    <script>
        let kpData = [];

        async function loadCSV() {
            try {
                const response = await fetch('manseikplist.csv');
                if (!response.ok) {
                    throw new Error('CSVファイルが見つかりません');
                }
                
                const csvText = await response.text();
                const lines = csvText.split('\n');
                
                for (let i = 1; i < lines.length; i++) {
                    const line = lines[i].trim();
                    if (line === '') continue;
                    
                    const columns = line.split(',');
                    if (columns.length < 8) continue;
                    
                    const route = columns[0].trim();
                    const kp = columns[1].trim();
                    
                    const latDeg = parseFloat(columns[2]);
                    const latMin = parseFloat(columns[3]);
                    const latSec = parseFloat(columns[4]);
                    
                    const lonDeg = parseFloat(columns[5]);
                    const lonMin = parseFloat(columns[6]);
                    const lonSec = parseFloat(columns[7]);
                    
                    const lat = latDeg + latMin / 60 + latSec / 3600;
                    const lon = lonDeg + lonMin / 60 + lonSec / 3600;
                    
                    kpData.push({
                        route: route,
                        kp: kp,
                        lat: lat,
                        lon: lon
                    });
                }
                
                document.getElementById('dataCount').textContent = kpData.length.toLocaleString();
                console.log(`CSVデータ読み込み完了: ${kpData.length}件`);
                
            } catch (error) {
                console.error('CSV読み込みエラー:', error);
                document.getElementById('csvWarning').style.display = 'block';
                document.getElementById('dataCount').textContent = '0';
            }
        }

        document.addEventListener('DOMContentLoaded', function() {
            loadCSV();
        });

        function switchTab(tabName) {
            const tabs = document.querySelectorAll('.tab');
            const contents = document.querySelectorAll('.tab-content');
            
            tabs.forEach(tab => tab.classList.remove('active'));
            contents.forEach(content => content.classList.remove('active'));
            
            if (tabName === 'coords') {
                tabs[0].classList.add('active');
                document.getElementById('coordsTab').classList.add('active');
            } else if (tabName === 'address') {
                tabs[1].classList.add('active');
                document.getElementById('addressTab').classList.add('active');
            }
            
            document.getElementById('result').classList.remove('show');
            document.getElementById('error').classList.remove('show');
            document.getElementById('searchResults').classList.remove('show');
        }

        async function searchAddress() {
            const address = document.getElementById('addressInput').value.trim();
            
            if (!address) {
                showError('住所を入力してください。');
                return;
            }
            
            const loading = document.getElementById('loading');
            const result = document.getElementById('result');
            const error = document.getElementById('error');
            const searchResults = document.getElementById('searchResults');
            
            result.classList.remove('show');
            error.classList.remove('show');
            searchResults.classList.remove('show');
            loading.classList.add('show');
            
            try {
                const searchQueries = [
                    `東京都${address}`,
                    `Tokyo, ${address}`,
                    address
                ];
                
                let foundResults = [];
                
                for (const query of searchQueries) {
                    await new Promise(resolve => setTimeout(resolve, 1000));
                    
                    const response = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(query)}&limit=5&addressdetails=1&countrycodes=jp`, {
                        headers: {
                            'Accept-Language': 'ja',
                            'User-Agent': 'ManseBashiKun/0.1'
                        }
                    });
                    
                    if (response.ok) {
                        const data = await response.json();
                        if (data.length > 0) {
                            foundResults = data;
                            break;
                        }
                    }
                }
                
                loading.classList.remove('show');
                
                if (foundResults.length === 0) {
                    showError('住所が見つかりませんでした。<br>例: 板橋区大門14-3、板橋区赤塚8丁目19<br>※区市町村名から入力してください');
                    return;
                }
                
                if (foundResults.length === 1) {
                    const lat = parseFloat(foundResults[0].lat);
                    const lon = parseFloat(foundResults[0].lon);
                    
                    document.getElementById('latInput').value = lat;
                    document.getElementById('lonInput').value = lon;
                    
                    loading.classList.add('show');
                    setTimeout(() => {
                        processLocation(lat, lon);
                    }, 500);
                } else {
                    displaySearchResults(foundResults);
                }
                
            } catch (err) {
                console.error('住所検索エラー:', err);
                loading.classList.remove('show');
                showError('住所の検索に失敗しました。インターネット接続を確認してください。');
            }
        }

        function displaySearchResults(results) {
            const searchResults = document.getElementById('searchResults');
            searchResults.innerHTML = '';
            
            results.forEach(item => {
                const div = document.createElement('div');
                div.className = 'search-result-item';
                div.textContent = item.display_name;
                div.onclick = () => selectSearchResult(item);
                searchResults.appendChild(div);
            });
            
            searchResults.classList.add('show');
        }

        function selectSearchResult(item) {
            const lat = parseFloat(item.lat);
            const lon = parseFloat(item.lon);
            
            document.getElementById('latInput').value = lat;
            document.getElementById('lonInput').value = lon;
            document.getElementById('searchResults').classList.remove('show');
            
            const loading = document.getElementById('loading');
            const result = document.getElementById('result');
            const error = document.getElementById('error');
            
            result.classList.remove('show');
            error.classList.remove('show');
            loading.classList.add('show');
            
            setTimeout(() => {
                processLocation(lat, lon);
            }, 500);
        }

        function testLocation() {
            const lat = parseFloat(document.getElementById('latInput').value);
            const lon = parseFloat(document.getElementById('lonInput').value);

            if (isNaN(lat) || isNaN(lon)) {
                showError('緯度・経度を正しく入力してください。');
                return;
            }

            if (lat < -90 || lat > 90) {
                showError('緯度は-90から90の範囲で入力してください。');
                return;
            }

            if (lon < -180 || lon > 180) {
                showError('経度は-180から180の範囲で入力してください。');
                return;
            }

            const loading = document.getElementById('loading');
            const result = document.getElementById('result');
            const error = document.getElementById('error');
            
            result.classList.remove('show');
            error.classList.remove('show');
            loading.classList.add('show');

            setTimeout(() => {
                processLocation(lat, lon);
            }, 500);
        }

        function getLocation() {
            const loading = document.getElementById('loading');
            const result = document.getElementById('result');
            const error = document.getElementById('error');
            
            result.classList.remove('show');
            error.classList.remove('show');
            loading.classList.add('show');

            if (!navigator.geolocation) {
                showError('お使いのブラウザは位置情報をサポートしていません。');
                loading.classList.remove('show');
                return;
            }

            navigator.geolocation.getCurrentPosition(
                position => {
                    const lat = position.coords.latitude;
                    const lon = position.coords.longitude;
                    document.getElementById('latInput').value = lat;
                    document.getElementById('lonInput').value = lon;
                    processLocation(lat, lon);
                },
                err => {
                    loading.classList.remove('show');
                    let message = '位置情報の取得に失敗しました。';
                    if (err.code === 1) {
                        message = '位置情報の利用が許可されていません。ブラウザの設定を確認してください。';
                    } else if (err.code === 2) {
                        message = '位置情報を取得できませんでした。GPS信号を確認してください。';
                    } else if (err.code === 3) {
                        message = '位置情報の取得がタイムアウトしました。もう一度お試しください。';
                    }
                    showError(message);
                },
                {
                    enableHighAccuracy: true,
                    timeout: 15000,
                    maximumAge: 0
                }
            );
        }

        function processLocation(lat, lon) {
            if (kpData.length === 0) {
                showError('キロポストデータが読み込まれていません。CSVファイルを確認してください。');
                document.getElementById('loading').classList.remove('show');
                return;
            }

            let minDistance = Infinity;
            let nearestPoint = null;

            kpData.forEach(point => {
                const distance = calculateDistance(lat, lon, point.lat, point.lon);
                if (distance < minDistance) {
                    minDistance = distance;
                    nearestPoint = point;
                }
            });

            if (nearestPoint && minDistance < 0.5) {
                const interpolatedKP = interpolateKP(lat, lon, nearestPoint);
                getAddressFromCoords(lat, lon, interpolatedKP, minDistance);
            } else {
                showError(`近くに該当する国道が見つかりませんでした。<br>最寄りの地点まで約${(minDistance * 1000).toFixed(0)}mです。<br><br>入力座標: 緯度 ${lat.toFixed(6)}, 経度 ${lon.toFixed(6)}`);
                document.getElementById('loading').classList.remove('show');
            }
        }

        function interpolateKP(lat, lon, nearestPoint) {
            const route = nearestPoint.route;
            
            const routePoints = kpData
                .filter(point => point.route === route)
                .map(point => ({
                    ...point,
                    kpNum: parseFloat(point.kp)
                }))
                .sort((a, b) => a.kpNum - b.kpNum);
            
            let bestSegment = null;
            let minPerpendicularDist = Infinity;
            
            for (let i = 0; i < routePoints.length - 1; i++) {
                const p1 = routePoints[i];
                const p2 = routePoints[i + 1];
                
                const projection = getProjectionOnSegment(lat, lon, p1, p2);
                
                if (projection.distance < minPerpendicularDist) {
                    minPerpendicularDist = projection.distance;
                    bestSegment = {
                        p1: p1,
                        p2: p2,
                        ratio: projection.ratio
                    };
                }
            }
            
            if (bestSegment) {
                const kpDiff = bestSegment.p2.kpNum - bestSegment.p1.kpNum;
                const interpolatedKPValue = bestSegment.p1.kpNum + kpDiff * bestSegment.ratio;
                
                console.log('補間計算:', {
                    p1: bestSegment.p1.kpNum,
                    p2: bestSegment.p2.kpNum,
                    ratio: bestSegment.ratio,
                    result: interpolatedKPValue
                });
                
                return {
                    route: route,
                    kp: interpolatedKPValue.toFixed(2),
                    lat: lat,
                    lon: lon
                };
            }
            
            return {
                route: nearestPoint.route,
                kp: parseFloat(nearestPoint.kp).toFixed(2),
                lat: lat,
                lon: lon
            };
        }

        function getProjectionOnSegment(lat, lon, p1, p2) {
            const dx = p2.lon - p1.lon;
            const dy = p2.lat - p1.lat;
            
            if (dx === 0 && dy === 0) {
                return {
                    distance: calculateDistance(lat, lon, p1.lat, p1.lon),
                    ratio: 0
                };
            }
            
            const t = ((lon - p1.lon) * dx + (lat - p1.lat) * dy) / (dx * dx + dy * dy);
            const clampedT = Math.max(0, Math.min(1, t));
            
            const projLat = p1.lat + clampedT * dy;
            const projLon = p1.lon + clampedT * dx;
            
            return {
                distance: calculateDistance(lat, lon, projLat, projLon),
                ratio: clampedT
            };
        }

        function calculateDistance(lat1, lon1, lat2, lon2) {
            const R = 6371;
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
                      Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
                      Math.sin(dLon/2) * Math.sin(dLon/2);
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
            return R * c;
        }

        function calculateBearingToNextKP(currentKP) {
            const route = currentKP.route;
            const kp = parseFloat(currentKP.kp);
            
            let nextKP = null;
            let minDiff = Infinity;
            
            kpData.forEach(point => {
                if (point.route === route) {
                    const pointKP = parseFloat(point.kp);
                    const diff = pointKP - kp;
                    if (diff > 0 && diff < minDiff) {
                        minDiff = diff;
                        nextKP = point;
                    }
                }
            });
            
            if (!nextKP) {
                let prevKP = null;
                let maxDiff = -Infinity;
                
                kpData.forEach(point => {
                    if (point.route === route) {
                        const pointKP = parseFloat(point.kp);
                        const diff = pointKP - kp;
                        if (diff < 0 && diff > maxDiff) {
                            maxDiff = diff;
                            prevKP = point;
                        }
                    }
                });
                
                if (!prevKP) return null;
                
                const lat1 = prevKP.lat * Math.PI / 180;
                const lat2 = currentKP.lat * Math.PI / 180;
                const lon1 = prevKP.lon * Math.PI / 180;
                const lon2 = currentKP.lon * Math.PI / 180;
                
                const dLon = lon2 - lon1;
                const y = Math.sin(dLon) * Math.cos(lat2);
                const x = Math.cos(lat1) * Math.sin(lat2) - Math.sin(lat1) * Math.cos(lat2) * Math.cos(dLon);
                const bearing = Math.atan2(y, x);
                
                return bearing;
            }
            
            const lat1 = currentKP.lat * Math.PI / 180;
            const lat2 = nextKP.lat * Math.PI / 180;
            const lon1 = currentKP.lon * Math.PI / 180;
            const lon2 = nextKP.lon * Math.PI / 180;
            
            const dLon = lon2 - lon1;
            const y = Math.sin(dLon) * Math.cos(lat2);
            const x = Math.cos(lat1) * Math.sin(lat2) - Math.sin(lat1) * Math.cos(lat2) * Math.cos(dLon);
            const bearing = Math.atan2(y, x);
            
            return bearing;
        }

        function calculateOffsetPosition(lat, lon, bearing, offsetMeters, leftOrRight) {
            const R = 6371000;
            
            let perpendicularBearing = bearing + Math.PI / 2;
            if (leftOrRight === 'left') {
                perpendicularBearing = bearing - Math.PI / 2;
            }
            
            const latRad = lat * Math.PI / 180;
            const lonRad = lon * Math.PI / 180;
            
            const newLat = Math.asin(
                Math.sin(latRad) * Math.cos(offsetMeters / R) +
                Math.cos(latRad) * Math.sin(offsetMeters / R) * Math.cos(perpendicularBearing)
            );
            
            const newLon = lonRad + Math.atan2(
                Math.sin(perpendicularBearing) * Math.sin(offsetMeters / R) * Math.cos(latRad),
                Math.cos(offsetMeters / R) - Math.sin(latRad) * Math.sin(newLat)
            );
            
            return {
                lat: newLat * 180 / Math.PI,
                lon: newLon * 180 / Math.PI
            };
        }

        async function getAddressFromCoords(lat, lon, kpPoint, distance) {
            try {
                const bearing = calculateBearingToNextKP(kpPoint);
                
                if (bearing === null) {
                    showError('道路方向を計算できませんでした。住所取得をスキップします。');
                    displayResultWithoutAddress(kpPoint, distance, lat, lon);
                    return;
                }
                
                const leftPos = calculateOffsetPosition(lat, lon, bearing, 50, 'left');
                const rightPos = calculateOffsetPosition(lat, lon, bearing, 50, 'right');
                
                await new Promise(resolve => setTimeout(resolve, 1000));
                
                const responseLeft = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${leftPos.lat}&lon=${leftPos.lon}&zoom=18&addressdetails=1`, {
                    headers: {
                        'Accept-Language': 'ja',
                        'User-Agent': 'ManseBashiKun/0.1'
                    }
                });
                
                if (!responseLeft.ok) throw new Error('住所取得エラー');
                const dataLeft = await responseLeft.json();
                
                await new Promise(resolve => setTimeout(resolve, 1000));
                
                const responseRight = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${rightPos.lat}&lon=${rightPos.lon}&zoom=18&addressdetails=1`, {
                    headers: {
                        'Accept-Language': 'ja',
                        'User-Agent': 'ManseBashiKun/0.1'
                    }
                });
                
                if (!responseRight.ok) throw new Error('住所取得エラー');
                const dataRight = await responseRight.json();

                displayResult(kpPoint, dataLeft, dataRight, distance, lat, lon);
            } catch (err) {
                console.error('住所取得エラー:', err);
                showError('住所の取得に失敗しました。インターネット接続を確認してください。<br>キロポスト情報のみ表示します。');
                displayResultWithoutAddress(kpPoint, distance, lat, lon);
            }
        }

        function extractAddress(data) {
            if (!data.address) return '住所不明';
            const addr = data.address;
            let result = '';
            
            let city = '';
            if (addr.city) city = addr.city;
            else if (addr.town) city = addr.town;
            else if (addr.village) city = addr.village;
            else if (addr.county) city = addr.county;
            result += city;
            
            let townName = '';
            
            if (addr.suburb) townName = addr.suburb;
            else if (addr.quarter) townName = addr.quarter;
            else if (addr.neighbourhood) townName = addr.neighbourhood;
            else if (addr.hamlet) townName = addr.hamlet;
            else if (addr.city_district) townName = addr.city_district;
            else if (addr.district) townName = addr.district;
            
            if (townName && city) {
                if (townName.startsWith(city)) {
                    townName = townName.substring(city.length);
                }
            }
            
            result += townName;
            
            if (addr.house_number) {
                const houseNum = addr.house_number;
                const match = houseNum.match(/^(\d+)-(\d+)/);
                if (match) {
                    result += match[1] + '-' + match[2];
                } else {
                    const parts = houseNum.split('-');
                    if (parts.length >= 2) {
                        result += parts[0] + '-' + parts[1];
                    } else if (parts.length === 1) {
                        result += parts[0];
                    }
                }
            }
            
            console.log('住所データ:', addr);
            console.log('抽出結果:', result);
            
            return result || (data.display_name ? data.display_name.split(',').slice(0, 3).join('') : '住所不明');
        }

        function formatRouteDisplay(route) {
            if (route === '17BP' || route.toUpperCase() === '17BP') {
                return '17BP';
            }
            return route + '号線';
        }

        function formatKP(kp) {
            const kpNum = parseFloat(kp);
            return kpNum.toFixed(2);
        }

        function displayResult(kpPoint, addrLeftData, addrRightData, distance, lat, lon) {
            const resultText = document.getElementById('resultText');
            const loading = document.getElementById('loading');
            const result = document.getElementById('result');

            const addrLeft = extractAddress(addrLeftData);
            const addrRight = extractAddress(addrRightData);
            const routeDisplay = formatRouteDisplay(kpPoint.route);
            const kpDisplay = formatKP(kpPoint.kp);

            let html = `<p><strong>現在位置は${routeDisplay} ${kpDisplay}kpです。</strong></p>`;
            html += `<div class="address-info">`;
            html += `<p>上り線の住所は${addrRight}、下り線の住所は${addrLeft}です。</p>`;
            html += `<p style="font-size: 12px; color: #999; margin-top: 10px;">地点までの距離: 約${(distance * 1000).toFixed(0)}m</p>`;
            html += `<p style="font-size: 12px; color: #999;">入力座標: 緯度 ${lat.toFixed(6)}, 経度 ${lon.toFixed(6)}</p>`;
            html += `</div>`;

            resultText.innerHTML = html;
            loading.classList.remove('show');
            result.classList.add('show');
        }

        function displayResultWithoutAddress(kpPoint, distance, lat, lon) {
            const resultText = document.getElementById('resultText');
            const loading = document.getElementById('loading');
            const result = document.getElementById('result');

            const routeDisplay = formatRouteDisplay(kpPoint.route);
            const kpDisplay = formatKP(kpPoint.kp);

            let html = `<p><strong>現在位置は${routeDisplay} ${kpDisplay}kpです。</strong></p>`;
            html += `<p style="font-size: 12px; color: #999; margin-top: 10px;">地点までの距離: 約${(distance * 1000).toFixed(0)}m</p>`;
            html += `<p style="font-size: 12px; color: #999;">入力座標: 緯度 ${lat.toFixed(6)}, 経度 ${lon.toFixed(6)}</p>`;

            resultText.innerHTML = html;
            loading.classList.remove('show');
            result.classList.add('show');
        }

        function showError(message) {
            const errorText = document.getElementById('errorText');
            const error = document.getElementById('error');
            const loading = document.getElementById('loading');
            errorText.innerHTML = message;
            error.classList.add('show');
            loading.classList.remove('show');
        }
    </script>
