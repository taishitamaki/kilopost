<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>万世橋くん ver.0.1 テスト版</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Hiragino Kaku Gothic Pro', 'ヒラギノ角ゴ Pro W3', 'メイリオ', Meiryo, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            overflow: hidden;
        }
        header {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: white;
            padding: 25px 20px;
            text-align: center;
        }
        header h1 {
            font-size: 28px;
            margin-bottom: 5px;
        }
        header .version {
            font-size: 14px;
            opacity: 0.9;
        }
        main {
            padding: 30px 20px;
        }
        .test-mode {
            background: #fff3cd;
            border-left: 4px solid #ffc107;
            color: #856404;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
            font-weight: bold;
        }
        .input-section {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
        }
        .input-group {
            margin-bottom: 15px;
        }
        .input-group label {
            display: block;
            font-size: 14px;
            color: #333;
            margin-bottom: 5px;
            font-weight: bold;
        }
        .input-group input {
            width: 100%;
            padding: 12px;
            font-size: 16px;
            border: 2px solid #ddd;
            border-radius: 8px;
            transition: border-color 0.3s;
        }
        .input-group input:focus {
            outline: none;
            border-color: #667eea;
        }
        .preset-buttons {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: 15px;
        }
        .preset-btn {
            background: #e7f3ff;
            color: #0066cc;
            border: 1px solid #0066cc;
            padding: 8px 15px;
            font-size: 13px;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .preset-btn:hover {
            background: #0066cc;
            color: white;
        }
        .button-container {
            text-align: center;
            margin-bottom: 30px;
            display: flex;
            gap: 10px;
            justify-content: center;
        }
        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 18px;
            border-radius: 50px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
        }
        button:active {
            transform: translateY(0);
        }
        button:disabled {
            background: #ccc;
            cursor: not-allowed;
            box-shadow: none;
        }
        .btn-secondary {
            background: linear-gradient(135deg, #28a745 0%, #20c997 100%);
        }
        .result {
            background: #f8f9fa;
            border-left: 4px solid #667eea;
            padding: 20px;
            border-radius: 8px;
            margin-top: 20px;
            display: none;
        }
        .result.show {
            display: block;
            animation: fadeIn 0.5s;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .result-text {
            font-size: 16px;
            line-height: 1.8;
            color: #333;
        }
        .result-text strong {
            color: #1e3c72;
            font-size: 18px;
        }
        .address-info {
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px dashed #ddd;
        }
        .error {
            background: #fff3cd;
            border-left: 4px solid #ff6b6b;
            color: #856404;
            padding: 15px;
            border-radius: 8px;
            margin-top: 20px;
            display: none;
        }
        .error.show {
            display: block;
            animation: fadeIn 0.5s;
        }
        .loading {
            text-align: center;
            color: #667eea;
            font-size: 16px;
            margin-top: 20px;
            display: none;
        }
        .loading.show {
            display: block;
        }
        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        footer {
            background: #f1f3f5;
            padding: 15px;
            text-align: center;
            font-size: 12px;
            color: #666;
        }
        .info-section {
            background: #e7f3ff;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
            color: #0066cc;
        }
        .stats {
            background: #f8f9fa;
            padding: 10px;
            border-radius: 5px;
            font-size: 12px;
            color: #666;
            margin-top: 10px;
        }
        .warning {
            background: #fff3cd;
            border-left: 4px solid #ffc107;
            color: #856404;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 13px;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>万世橋くん</h1>
            <div class="version">ver.0.1 テスト版</div>
        </header>
        
        <main>
            <div class="test-mode">
                🧪 テストモード: 任意の緯度・経度で動作確認できます
            </div>

            <div class="warning" id="csvWarning" style="display: none;">
                ⚠️ CSVファイルの読み込みに失敗しました。manseikplist.csvがHTMLと同じフォルダにあることを確認してください。
            </div>
            
            <div class="info-section">
                📍 任意の緯度・経度から国道番号、キロポスト、住所を取得します<br>
                <div class="stats">登録キロポスト数: <span id="dataCount">読込中...</span>件</div>
            </div>

            <div class="input-section">
                <div class="input-group">
                    <label for="latInput">緯度（度）</label>
                    <input type="number" id="latInput" step="0.000001" placeholder="例: 35.683417" value="35.683417">
                </div>
                <div class="input-group">
                    <label for="lonInput">経度（度）</label>
                    <input type="number" id="lonInput" step="0.000001" placeholder="例: 139.774500" value="139.774500">
                </div>
                <div class="preset-buttons">
                    <button class="preset-btn" onclick="setPreset(35.683417, 139.774500)">日本橋（国道4号起点）</button>
                    <button class="preset-btn" onclick="setPreset(35.685750, 139.745833)">国道254号 12.24kp付近</button>
                    <button class="preset-btn" onclick="setPreset(35.710083, 139.750333)">国道122号 3.0kp付近</button>
                </div>
            </div>
            
            <div class="button-container">
                <button id="testLocationBtn" onclick="testLocation()">この位置でテスト</button>
                <button class="btn-secondary" onclick="getLocation()">実際の位置を取得</button>
            </div>
            
            <div class="loading" id="loading">
                <div class="spinner"></div>
                <p>位置情報を処理中...</p>
            </div>
            
            <div class="result" id="result">
                <div class="result-text" id="resultText"></div>
            </div>
            
            <div class="error" id="error">
                <p id="errorText"></p>
            </div>
        </main>
        
        <footer>
            © 2026 Tamaki - 万世橋出張所管内国道維持補修支援システム
        </footer>
    </div>

    <script>
        let kpData = [];

        async function loadCSV() {
            try {
                const response = await fetch('manseikplist.csv');
                if (!response.ok) {
                    throw new Error('CSVファイルが見つかりません');
                }
                
                const csvText = await response.text();
                const lines = csvText.split('\n');
                
                for (let i = 1; i < lines.length; i++) {
                    const line = lines[i].trim();
                    if (line === '') continue;
                    
                    const columns = line.split(',');
                    if (columns.length < 8) continue;
                    
                    const route = columns[0].trim();
                    const kp = columns[1].trim();
                    
                    const latDeg = parseFloat(columns[2]);
                    const latMin = parseFloat(columns[3]);
                    const latSec = parseFloat(columns[4]);
                    
                    const lonDeg = parseFloat(columns[5]);
                    const lonMin = parseFloat(columns[6]);
                    const lonSec = parseFloat(columns[7]);
                    
                    const lat = latDeg + latMin / 60 + latSec / 3600;
                    const lon = lonDeg + lonMin / 60 + lonSec / 3600;
                    
                    kpData.push({
                        route: route,
                        kp: kp,
                        lat: lat,
                        lon: lon
                    });
                }
                
                document.getElementById('dataCount').textContent = kpData.length.toLocaleString();
                console.log(`CSVデータ読み込み完了: ${kpData.length}件`);
                
            } catch (error) {
                console.error('CSV読み込みエラー:', error);
                document.getElementById('csvWarning').style.display = 'block';
                document.getElementById('dataCount').textContent = '0';
            }
        }

        document.addEventListener('DOMContentLoaded', function() {
            loadCSV();
        });

        function setPreset(lat, lon) {
            document.getElementById('latInput').value = lat;
            document.getElementById('lonInput').value = lon;
        }

        function testLocation() {
            const lat = parseFloat(document.getElementById('latInput').value);
            const lon = parseFloat(document.getElementById('lonInput').value);

            if (isNaN(lat) || isNaN(lon)) {
                showError('緯度・経度を正しく入力してください。');
                return;
            }

            if (lat < -90 || lat > 90) {
                showError('緯度は-90から90の範囲で入力してください。');
                return;
            }

            if (lon < -180 || lon > 180) {
                showError('経度は-180から180の範囲で入力してください。');
                return;
            }

            const loading = document.getElementById('loading');
            const result = document.getElementById('result');
            const error = document.getElementById('error');
            
            result.classList.remove('show');
            error.classList.remove('show');
            loading.classList.add('show');

            setTimeout(() => {
                processLocation(lat, lon);
            }, 500);
        }

        function getLocation() {
            const loading = document.getElementById('loading');
            const result = document.getElementById('result');
            const error = document.getElementById('error');
            
            result.classList.remove('show');
            error.classList.remove('show');
            loading.classList.add('show');

            if (!navigator.geolocation) {
                showError('お使いのブラウザは位置情報をサポートしていません。');
                loading.classList.remove('show');
                return;
            }

            navigator.geolocation.getCurrentPosition(
                position => {
                    const lat = position.coords.latitude;
                    const lon = position.coords.longitude;
                    document.getElementById('latInput').value = lat;
                    document.getElementById('lonInput').value = lon;
                    processLocation(lat, lon);
                },
                err => {
                    loading.classList.remove('show');
                    let message = '位置情報の取得に失敗しました。';
                    if (err.code === 1) {
                        message = '位置情報の利用が許可されていません。ブラウザの設定を確認してください。';
                    } else if (err.code === 2) {
                        message = '位置情報を取得できませんでした。GPS信号を確認してください。';
                    } else if (err.code === 3) {
                        message = '位置情報の取得がタイムアウトしました。もう一度お試しください。';
                    }
                    showError(message);
                },
                {
                    enableHighAccuracy: true,
                    timeout: 15000,
                    maximumAge: 0
                }
            );
        }

        function processLocation(lat, lon) {
            if (kpData.length === 0) {
                showError('キロポストデータが読み込まれていません。CSVファイルを確認してください。');
                document.getElementById('loading').classList.remove('show');
                return;
            }

            let minDistance = Infinity;
            let nearestPoint = null;

            kpData.forEach(point => {
                const distance = calculateDistance(lat, lon, point.lat, point.lon);
                if (distance < minDistance) {
                    minDistance = distance;
                    nearestPoint = point;
                }
            });

            if (nearestPoint && minDistance < 0.5) {
                getAddressFromCoords(lat, lon, nearestPoint, minDistance);
            } else {
                showError(`近くに該当する国道が見つかりませんでした。<br>最寄りの地点まで約${(minDistance * 1000).toFixed(0)}mです。<br><br>入力座標: 緯度 ${lat.toFixed(6)}, 経度 ${lon.toFixed(6)}`);
                document.getElementById('loading').classList.remove('show');
            }
        }

        function calculateDistance(lat1, lon1, lat2, lon2) {
            const R = 6371;
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
                      Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
                      Math.sin(dLon/2) * Math.sin(dLon/2);
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
            return R * c;
        }

        async function getAddressFromCoords(lat, lon, kpPoint, distance) {
            try {
                await new Promise(resolve => setTimeout(resolve, 1000));
                
                const response = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}&zoom=18&addressdetails=1`, {
                    headers: {
                        'Accept-Language': 'ja',
                        'User-Agent': 'ManseBashiKun/0.1'
                    }
                });
                
                if (!response.ok) throw new Error('住所取得エラー');
                const data = await response.json();
                
                await new Promise(resolve => setTimeout(resolve, 1000));
                
                const bearing = Math.atan2(
                    Math.cos(lat * Math.PI / 180) * Math.sin(0.0005),
                    Math.cos(lat * Math.PI / 180) * Math.sin(0.0005)
                );
                const offset = 0.0002;
                const lat2 = lat + offset * Math.cos(bearing + Math.PI / 2);
                const lon2 = lon + offset * Math.sin(bearing + Math.PI / 2);
                
                const response2 = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat2}&lon=${lon2}&zoom=18&addressdetails=1`, {
                    headers: {
                        'Accept-Language': 'ja',
                        'User-Agent': 'ManseBashiKun/0.1'
                    }
                });
                
                if (!response2.ok) throw new Error('住所取得エラー');
                const data2 = await response2.json();

                displayResult(kpPoint, data, data2, distance, lat, lon);
            } catch (err) {
                showError('住所の取得に失敗しました。インターネット接続を確認してください。<br>キロポスト情報のみ表示します。');
                displayResultWithoutAddress(kpPoint, distance, lat, lon);
            }
        }

        function extractAddress(data) {
            if (!data.address) return '住所不明';
            const addr = data.address;
            let result = '';
            
            if (addr.city) result += addr.city;
            else if (addr.town) result += addr.town;
            
            if (addr.suburb) result += addr.suburb;
            if (addr.quarter) result += addr.quarter;
            if (addr.neighbourhood) result += addr.neighbourhood;
            if (addr.road) result += addr.road;
            if (addr.house_number) result += addr.house_number;
            
            return result || (data.display_name ? data.display_name.split(',')[0] : '住所不明');
        }

        function displayResult(kpPoint, addr1Data, addr2Data, distance, lat, lon) {
            const resultText = document.getElementById('resultText');
            const loading = document.getElementById('loading');
            const result = document.getElementById('result');

            const addr1 = extractAddress(addr1Data);
            const addr2 = extractAddress(addr2Data);

            let html = `<p><strong>現在位置は${kpPoint.route} ${kpPoint.kp}kpです。</strong></p>`;
            html += `<div class="address-info">`;
            html += `<p>上り線の住所は${addr1}、下り線の住所は${addr2}です。</p>`;
            html += `<p style="font-size: 12px; color: #999; margin-top: 10px;">地点までの距離: 約${(distance * 1000).toFixed(0)}m</p>`;
            html += `<p style="font-size: 12px; color: #999;">入力座標: 緯度 ${lat.toFixed(6)}, 経度 ${lon.toFixed(6)}</p>`;
            html += `<p style="font-size: 12px; color: #999;">最寄KP座標: 緯度 ${kpPoint.lat.toFixed(6)}, 経度 ${kpPoint.lon.toFixed(6)}</p>`;
            html += `</div>`;

            resultText.innerHTML = html;
            loading.classList.remove('show');
            result.classList.add('show');
        }

        function displayResultWithoutAddress(kpPoint, distance, lat, lon) {
            const resultText = document.getElementById('resultText');
            const loading = document.getElementById('loading');
            const result = document.getElementById('result');

            let html = `<p><strong>現在位置は${kpPoint.route} ${kpPoint.kp}kpです。</strong></p>`;
            html += `<p style="font-size: 12px; color: #999; margin-top: 10px;">地点までの距離: 約${(distance * 1000).toFixed(0)}m</p>`;
            html += `<p style="font-size: 12px; color: #999;">入力座標: 緯度 ${lat.toFixed(6)}, 経度 ${lon.toFixed(6)}</p>`;
            html += `<p style="font-size: 12px; color: #999;">最寄KP座標: 緯度 ${kpPoint.lat.toFixed(6)}, 経度 ${kpPoint.lon.toFixed(6)}</p>`;

            resultText.innerHTML = html;
            loading.classList.remove('show');
            result.classList.add('show');
        }

        function showError(message) {
            const errorText = document.getElementById('errorText');
            const error = document.getElementById('error');
            const loading = document.getElementById('loading');
            errorText.innerHTML = message;
            error.classList.add('show');
            loading.classList.remove('show');
        }
    </script>
</body>
</html>
